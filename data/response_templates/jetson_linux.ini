;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;;       NVIDIA SDK Manager Response File Template for JetPack SDKs       ;;;
;;;                                                                        ;;;
;;; This file contains arguments, values and user inputs for SDK Manager.  ;;;
;;; It enables running automation and unattended sessions.                 ;;;
;;;                                                                        ;;;
;;; To use this sample response file:                                      ;;;
;;; 1. Copy the file and enable for edit                                   ;;;
;;; 2. Edit the arguments and values as needed                             ;;;
;;; 3. Run: sdkmanager --cli --response-file <response_file_path>          ;;;
;;;                                                                        ;;;
;;; More information and value options are available by using:             ;;;
;;;   sdkmanager --query      [Available SDKs options for the user]        ;;;
;;;   sdkmanager --help       [SDK Manager CLI syntax]                     ;;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

;;;;;;;;;;;;;;;;;;;;;;;;
;;; General Settings ;;;
;;;;;;;;;;;;;;;;;;;;;;;;

[client_arguments]
;; "action" Set the session action: install, uninstall or downloadonly.
action = install

;; "login-type" devzone. Set the login server, login with developer.nvidia.com (devzone) account.
login-type = devzone

;; "stay-logged-in" Keep the user account logged-in for next running session
; stay-logged-in = true

;; "product" Set the product name.
product = Jetson

;; "version" Set the product version. Use --query to get available version values.
version = 7.0

;; "target-os" Set the target hardware operating system.
target-os = Linux

;; "host" Set if host side components need to be installed.
host = true

;; "target" Set the target hardware in use. Use hardware code name. target hardware ID or series IDs
;; The full target hardware IDs for each release can be found with "sdkmanager --cli --query --product Jetson" command.
;; Examples are: JETSON_AGX_THOR_TARGETS, JETSON_AGX_ORIN_TARGETS, JETSON_AGX_XAVIER_TARGETS
target = JETSON_AGX_THOR_TARGETS

;; "flash" Set the flash operation mode.
flash = true

;; "usb-port" Select the usb port if multiple boards connected
;; To query all Jetson devices that are connected to the local machine, run sdkmanager --list-connected Jetson
; usb-port = 1-6.4

;; "additional-sdk[]" Specify additional SDK to install. Multiple entries are allowed, each in a separate line.
;; this feature is enabled from Jetpack 4.3.
; additional-sdk[] = DeepStream
; additional-sdk[] = Holoscan

;; "select[]" Specify section or group to installation list. Multiple entries are allowed, each in a separate line.
; select[] = Jetson Linux
; select[] = Jetson Runtime Components
; select[] = Jetson SDK Components

;; "deselect[]" Specify section or group to exclude from installation list. Multiple entries are allowed, each in a separate line.
; deselect[] = Jetson Linux
; deselect[] = Jetson Runtime Components
; deselect[] = Jetson SDK Components

;; "download-folder" Set the download folder for the SDK components. Used for downloading the files and for locating the SDK components when using --login-type offline.
; download-folder = ~/Downloads/nvidia/sdkm_downloads/

;; "target-image-folder" Set the host location of the target hardware image for flashing.
; target-image-folder = ~/nvidia/nvidia_sdk/

;; "license" Set this option to accept the terms and conditions of SDK license agreements.
; license = accept

;; "sudo-password" Set this host sudo password to skip the authentication prompt.
;; ***** Note: Password saved in this file are used as clear text *****
; sudo-password = host_sudo_password

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;;; Responses to required user prompts ;;;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

;; "collect-usage-data" enable|disable Set to enable or disable usage data collection.
;; collect-usage-data = enable

;; Define how to set the target hardware (devkit) into recovery mode.
[pre-flash-settings]
;; "recovery" automatic|manual Define how to set the target hardware (devkit) into recovery mode.
recovery = manual
;; Below parameters are required if recovery = automatic
;; ***** Note: Password saved in this file are used as clear text *****
;; "ip-type" supports ipv4|ipv6.
; ip-type = ipv4
; ip = 192.168.55.1
; user = device_username
; password = device_password
; retries = 2

;; "oem-configuration" = Runtime|Pre-Config Whether to configure OEM settings before flashing(Pre-Config) or after flashing (runtime).
; oem-configuration = Pre-Config
;; Set the username and password to be used in OEM preconfiguration.
; oem-username = new_OEM_username
; oem-password = new_OEM_password

;; "storage" default|nvme|usb|custom Define the storage to flash on. Default is emmc or sdcard.
;; storage = default
;; customize the command to specify a different storage to flash on. It is valid when storage = custom.
;; custom-flash = ./nvautoflash.sh --storage nvme0n1p1

;; Set the SSH connection details to the target hardware (devkit) for post flash activities.
[post-flash-settings]
;; "post-flash" install|skip Set when using post flash activities.
post-flash = install
;; Below parameters are required if post-flash = install
;; ***** Note: Password saved in this file are used as clear text *****
;; "ip-type" supports ipv4|ipv6.
ip-type = ipv4
ip = 192.168.55.1
user = device_username
password = device_password
retries = 2
