<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif">
  <!-- NVIDIA SDK Advisor — 5-phase end-to-end timeline on one architecture.
       Hero banner companion to docs/demo/full-mode.gif (the GIF records exactly these 5 phases). -->
  <style>
    .title       { font-size: 16px; font-weight: 700; fill: #1a202c; }
    .sub         { font-size: 11px; fill: #4a5568; }
    .phase-num   { font-size: 11px; font-weight: 700; fill: #ffffff; }
    .phase-name  { font-size: 12px; font-weight: 700; fill: #1a202c; }
    .phase-body  { font-size: 10px; fill: #2d3748; }
    .phase-tag   { font-size: 9px; font-weight: 700; letter-spacing: 0.4px; }
    .mono        { font-family: 'SF Mono', Consolas, Menlo, monospace; font-size: 10px; fill: #2d3748; }
    .label       { font-size: 13px; font-weight: 600; fill: #1a202c; }
    .label-ts    { font-size: 12px; font-weight: 600; fill: #0f766e; }
    .sub-ts      { font-size: 10px; fill: #0f766e; }
    .arrow       { stroke: #4a5568; stroke-width: 1.5; fill: none; }
    .arrow-fail  { stroke: #c53030; stroke-width: 1.5; fill: none; stroke-dasharray: 4 3; }
    .dashed-mcp  { stroke: #e53e3e; stroke-width: 1.8; stroke-dasharray: 6 5; fill: none; }
    .boundary    { font-size: 11px; font-weight: 700; fill: #c53030; letter-spacing: 0.5px; }
    .external    { font-size: 10px; fill: #6b46c1; font-style: italic; }
    .conn-note   { font-size: 10px; fill: #c53030; font-style: italic; }

    /* Phase box backgrounds, color-coded by phase role */
    .p-config    { fill: #fefaf2; stroke: #d97706; stroke-width: 1.8; }   /* configure */
    .p-install   { fill: #f7fafc; stroke: #4a5568; stroke-width: 1.5; }   /* install/retry */
    .p-trouble   { fill: #f0fdfa; stroke: #0d9488; stroke-width: 1.8; }   /* troubleshoot */
    .p-userrun   { fill: #fff5f5; stroke: #c53030; stroke-width: 1.5; stroke-dasharray: 3 2; }
    .p-num-bg-config  { fill: #d97706; }
    .p-num-bg-install { fill: #4a5568; }
    .p-num-bg-trouble { fill: #0d9488; }
    .p-num-bg-userrun { fill: #c53030; }
  </style>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" class="title">NVIDIA SDK Advisor — 5 phases on 1 architecture</text>
  <text x="360" y="40" text-anchor="middle" class="sub">End-to-end via <tspan class="mono">python main.py --full --mock-install</tspan>. The backend below serves all five phases.</text>

  <!-- ====================== PHASE TIMELINE (TOP) ====================== -->

  <!-- Phase 1: Configure -->
  <rect x="20" y="62" width="120" height="98" rx="6" class="p-config"/>
  <rect x="20" y="62" width="120" height="18" rx="6" class="p-num-bg-config"/>
  <text x="80" y="76" text-anchor="middle" class="phase-num">1. CONFIGURE</text>
  <text x="80" y="98" text-anchor="middle" class="phase-body">User describes hw</text>
  <text x="80" y="112" text-anchor="middle" class="phase-body">+ workload (text)</text>
  <text x="80" y="128" text-anchor="middle" class="phase-body">Agent + MCP tools</text>
  <text x="80" y="148" text-anchor="middle" class="mono">→ .ini + .command</text>
  <text x="80" y="158" text-anchor="middle" class="phase-tag" fill="#92400e">REAL</text>

  <!-- → -->
  <path d="M 142 111 L 153 111" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Phase 2: Install -->
  <rect x="155" y="62" width="120" height="98" rx="6" class="p-install"/>
  <rect x="155" y="62" width="120" height="18" rx="6" class="p-num-bg-install"/>
  <text x="215" y="76" text-anchor="middle" class="phase-num">2. INSTALL</text>
  <text x="215" y="98" text-anchor="middle" class="phase-body">NvSDKManager.exe</text>
  <text x="215" y="112" text-anchor="middle" class="phase-body">--cli --response-file</text>
  <text x="215" y="126" text-anchor="middle" class="phase-body">subprocess</text>
  <text x="215" y="148" text-anchor="middle" class="mono">→ log .zip</text>
  <text x="215" y="158" text-anchor="middle" class="phase-tag" fill="#475569">MOCKED</text>

  <!-- → -->
  <path d="M 277 111 L 288 111" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Phase 3: Troubleshoot -->
  <rect x="290" y="62" width="120" height="98" rx="6" class="p-trouble"/>
  <rect x="290" y="62" width="120" height="18" rx="6" class="p-num-bg-trouble"/>
  <text x="350" y="76" text-anchor="middle" class="phase-num">3. TROUBLESHOOT</text>
  <text x="350" y="98" text-anchor="middle" class="phase-body">parse_install_log</text>
  <text x="350" y="112" text-anchor="middle" class="phase-body">+ Agent reads tail</text>
  <text x="350" y="126" text-anchor="middle" class="phase-body">+ web_search</text>
  <text x="350" y="148" text-anchor="middle" class="mono">→ fix.sh + diag.md</text>
  <text x="350" y="158" text-anchor="middle" class="phase-tag" fill="#0f766e">REAL</text>

  <!-- → -->
  <path d="M 412 111 L 423 111" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Phase 4: Apply fix -->
  <rect x="425" y="62" width="120" height="98" rx="6" class="p-userrun"/>
  <rect x="425" y="62" width="120" height="18" rx="6" class="p-num-bg-userrun"/>
  <text x="485" y="76" text-anchor="middle" class="phase-num">4. APPLY FIX</text>
  <text x="485" y="98" text-anchor="middle" class="phase-body">User reviews</text>
  <text x="485" y="112" text-anchor="middle" class="phase-body">fix.sh,</text>
  <text x="485" y="126" text-anchor="middle" class="phase-body">runs (sudo gate)</text>
  <text x="485" y="148" text-anchor="middle" class="mono">→ system patched</text>
  <text x="485" y="158" text-anchor="middle" class="phase-tag" fill="#c53030">SIMULATED</text>

  <!-- → -->
  <path d="M 547 111 L 558 111" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Phase 5: Retry install -->
  <rect x="560" y="62" width="120" height="98" rx="6" class="p-install"/>
  <rect x="560" y="62" width="120" height="18" rx="6" class="p-num-bg-install"/>
  <text x="620" y="76" text-anchor="middle" class="phase-num">5. RETRY INSTALL</text>
  <text x="620" y="98" text-anchor="middle" class="phase-body">NvSDKManager.exe</text>
  <text x="620" y="112" text-anchor="middle" class="phase-body">again, post-fix</text>
  <text x="620" y="126" text-anchor="middle" class="phase-body">(loops to phase 2)</text>
  <text x="620" y="148" text-anchor="middle" class="mono">→ success ✓</text>
  <text x="620" y="158" text-anchor="middle" class="phase-tag" fill="#475569">MOCKED</text>

  <!-- "On fail" branch annotation between phase 2 and 3 -->
  <text x="282" y="178" text-anchor="middle" class="conn-note">↑ phases 3–5 fire only when phase 2 fails (recovery loop)</text>

  <!-- ====================== ARCHITECTURE (BELOW TIMELINE) ====================== -->

  <!-- Divider with caption -->
  <line x1="20" y1="200" x2="700" y2="200" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="360" y="216" text-anchor="middle" class="label">↓ Backend (one architecture serving all five phases) ↓</text>

  <!-- Agent box -->
  <rect x="20" y="228" width="680" height="84" rx="6" fill="#fefaf2" stroke="#d97706" stroke-width="1.8"/>
  <text x="360" y="250" text-anchor="middle" class="label">Claude Agent · Haiku 4.5 (swappable via ANTHROPIC_MODEL)</text>
  <text x="360" y="270" text-anchor="middle" class="sub">workflow + tool routing · synthesis · output writer</text>
  <text x="360" y="288" text-anchor="middle" class="sub">used in: <tspan font-weight="700" fill="#92400e">[1] configure</tspan> (dispatches MCP tools) · <tspan font-weight="700" fill="#0f766e">[3] troubleshoot</tspan> (reads log tail + web_search)</text>
  <text x="360" y="304" text-anchor="middle" class="external">↗ Anthropic API · server-side web_search (forums, docs, askubuntu, SO)</text>

  <!-- Arrows agent → MCP -->
  <path d="M 180 312 L 180 348" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="192" y="332" class="mono">stdio</text>
  <path d="M 540 312 L 540 348" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="552" y="332" class="mono">stdio</text>

  <!-- MCP boundary -->
  <line x1="20" y1="338" x2="700" y2="338" class="dashed-mcp"/>
  <text x="360" y="334" text-anchor="middle" class="boundary">— — — MCP boundary: each tool below is independently replaceable — — —</text>

  <!-- MCP server boxes -->
  <rect x="20" y="350" width="320" height="110" rx="6" fill="#f0f7ff" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="180" y="372" text-anchor="middle" class="label">nvidia-knowledge</text>
  <text x="180" y="388" text-anchor="middle" class="sub">deterministic · 13 tools</text>
  <text x="180" y="408" text-anchor="middle" class="mono">list_releases · lookup_target_id</text>
  <text x="180" y="423" text-anchor="middle" class="mono">validate_combo · estimate_resources</text>
  <text x="180" y="438" text-anchor="middle" class="mono">generate_response_file ...</text>
  <text x="180" y="455" text-anchor="middle" class="sub">used in <tspan font-weight="700" fill="#92400e">[1]</tspan> (all 13) · <tspan font-weight="700" fill="#0f766e">[3]</tspan> (parse_install_log)</text>

  <rect x="380" y="350" width="320" height="110" rx="6" fill="#f0f7ff" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="540" y="372" text-anchor="middle" class="label">nvidia-corpus-rag</text>
  <text x="540" y="388" text-anchor="middle" class="sub">semantic · 2 tools</text>
  <text x="540" y="408" text-anchor="middle" class="mono">lookup_container_reqs</text>
  <text x="540" y="423" text-anchor="middle" class="mono">  (NGC catalog · 20 entries)</text>
  <text x="540" y="438" text-anchor="middle" class="mono">search_3p_sample_repos (RAG)</text>
  <text x="540" y="455" text-anchor="middle" class="sub">used in <tspan font-weight="700" fill="#92400e">[1]</tspan> only — <tspan font-style="italic">RAG over GitHub samples + NGC catalog</tspan></text>

  <!-- Data sources row -->
  <path d="M 180 460 L 180 482" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 540 460 L 540 482" class="arrow" marker-end="url(#arrowhead)"/>

  <text x="180" y="498" text-anchor="middle" class="label">Data (configure)</text>
  <text x="180" y="514" text-anchor="middle" class="sub">CDN manifests (snapshot)</text>
  <text x="180" y="528" text-anchor="middle" class="sub">resource model · .ini templates</text>

  <text x="540" y="498" text-anchor="middle" class="label">Data (configure RAG)</text>
  <text x="540" y="514" text-anchor="middle" class="sub">NGC catalog (20 containers)</text>
  <text x="540" y="528" text-anchor="middle" class="sub">GitHub READMEs (21, Chroma)</text>

  <!-- Troubleshoot grounding note (no static data) -->
  <text x="360" y="556" text-anchor="middle" class="sub-ts">Troubleshoot grounding lives at the agent layer ↑ (server-side web_search) — no static corpus needed for phase 3.</text>

  <!-- Outputs flowing back -->
  <text x="360" y="586" text-anchor="middle" class="label">Outputs (per phase)</text>
  <text x="180" y="606" text-anchor="middle" class="mono">[1] output/&lt;query&gt;.ini · *.command</text>
  <text x="540" y="606" text-anchor="middle" class="mono-ts" fill="#0f766e">[3] fix.sh · diagnosis.md</text>
  <text x="180" y="622" text-anchor="middle" class="sub">→ consumed by [2] / [5] NvSDKManager subprocess</text>
  <text x="540" y="622" text-anchor="middle" class="sub-ts">→ user reviews + runs in [4] (sudo gate)</text>

  <!-- Footer -->
  <text x="360" y="666" text-anchor="middle" class="sub">Production path: replace each MCP tool with internal data sources — see <tspan font-style="italic">docs/why-this-demo.md → ranked knowledge bases.</tspan></text>

  <!-- Eval scores callout -->
  <text x="360" y="690" text-anchor="middle" class="sub">Eval grounding: [1] smoke 15/15 · reasoning 3.56/5 (20 forum cases) · [3] troubleshoot 3.66/5 (9 forum-mined cases, post self-grading-bias correction)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
</svg>
