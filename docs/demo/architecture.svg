<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif">
  <!-- NVIDIA SDK Advisor — agent + MCP architecture. Hero banner companion to docs/demo/full-mode.gif. -->
  <style>
    .layer-bg { fill: #ffffff; stroke: #2d3748; stroke-width: 1.5; }
    .agent-bg { fill: #fefaf2; stroke: #d97706; stroke-width: 1.8; }
    .mcp-bg   { fill: #f0f7ff; stroke: #2b6cb0; stroke-width: 1.5; }
    .out-bg   { fill: #f0fff4; stroke: #2f855a; stroke-width: 1.5; }
    .title    { font-size: 16px; font-weight: 700; fill: #1a202c; }
    .label    { font-size: 13px; font-weight: 600; fill: #1a202c; }
    .sub      { font-size: 11px; fill: #4a5568; }
    .mono     { font-family: 'SF Mono', Consolas, Menlo, monospace; font-size: 10.5px; fill: #2d3748; }
    .arrow    { stroke: #4a5568; stroke-width: 1.5; fill: none; }
    .dashed   { stroke: #e53e3e; stroke-width: 1.8; stroke-dasharray: 6 5; fill: none; }
    .boundary { font-size: 11px; font-weight: 700; fill: #c53030; letter-spacing: 0.5px; }
    .external { font-size: 10.5px; fill: #6b46c1; font-style: italic; }
  </style>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" class="title">NVIDIA SDK Advisor — agent + MCP architecture</text>
  <text x="340" y="48" text-anchor="middle" class="sub">A design study with executable evidence. Dashed line marks what's replaceable on the inside.</text>

  <!-- Layer 1: User input -->
  <rect x="80" y="74" width="520" height="56" rx="6" class="layer-bg"/>
  <text x="340" y="96" text-anchor="middle" class="label">User input (CLI today, GUI panel in production)</text>
  <text x="340" y="116" text-anchor="middle" class="mono">"I have an Orin NX 16GB and want to do edge LLM inference"</text>

  <!-- Arrow 1→2 -->
  <path d="M 340 130 L 340 156" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Layer 2: Agent -->
  <rect x="80" y="160" width="520" height="92" rx="6" class="agent-bg"/>
  <text x="340" y="183" text-anchor="middle" class="label">Claude Agent · Haiku 4.5 (swappable via ANTHROPIC_MODEL)</text>
  <text x="340" y="206" text-anchor="middle" class="sub">system prompt: workflow + tool routing · tool loop · output synthesis</text>
  <text x="340" y="226" text-anchor="middle" class="sub">+ server-side web_search (forums.developer.nvidia.com, docs, askubuntu, SO)</text>
  <text x="340" y="244" text-anchor="middle" class="external">↗ Anthropic API · WebSearch tool</text>

  <!-- Arrows 2→servers (split into two) -->
  <path d="M 220 252 L 220 296" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 460 252 L 460 296" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="232" y="270" class="mono">stdio</text>
  <text x="472" y="270" class="mono">stdio</text>

  <!-- MCP boundary dashed line -->
  <line x1="60" y1="282" x2="620" y2="282" class="dashed"/>
  <text x="340" y="277" text-anchor="middle" class="boundary">— — — — MCP boundary: each tool below is independently replaceable — — — —</text>

  <!-- Layer 3: MCP servers (side by side) -->
  <rect x="80" y="300" width="240" height="110" rx="6" class="mcp-bg"/>
  <text x="200" y="322" text-anchor="middle" class="label">nvidia-knowledge</text>
  <text x="200" y="340" text-anchor="middle" class="sub">deterministic · 13 tools</text>
  <text x="200" y="362" text-anchor="middle" class="mono">list_releases · lookup_target_id</text>
  <text x="200" y="378" text-anchor="middle" class="mono">validate_combo · estimate_resources</text>
  <text x="200" y="394" text-anchor="middle" class="mono">generate_response_file · parse_install_log</text>

  <rect x="360" y="300" width="240" height="110" rx="6" class="mcp-bg"/>
  <text x="480" y="322" text-anchor="middle" class="label">nvidia-corpus-rag</text>
  <text x="480" y="340" text-anchor="middle" class="sub">semantic · 2 tools</text>
  <text x="480" y="362" text-anchor="middle" class="mono">lookup_container_reqs</text>
  <text x="480" y="378" text-anchor="middle" class="mono">(NGC catalog · 20 entries)</text>
  <text x="480" y="394" text-anchor="middle" class="mono">search_3p_sample_repos (RAG)</text>

  <!-- Arrows servers→data -->
  <path d="M 200 410 L 200 440" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 480 410 L 480 440" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Layer 4: Data sources -->
  <text x="200" y="458" text-anchor="middle" class="label">Data sources</text>
  <text x="200" y="476" text-anchor="middle" class="sub">CDN manifests (snapshot)</text>
  <text x="200" y="492" text-anchor="middle" class="sub">resource model · response templates</text>

  <text x="480" y="458" text-anchor="middle" class="label">Data sources</text>
  <text x="480" y="476" text-anchor="middle" class="sub">NGC catalog (20 containers)</text>
  <text x="480" y="492" text-anchor="middle" class="sub">GitHub READMEs (21, Chroma index)</text>

  <!-- Convergence arrows back to outputs -->
  <path d="M 200 502 L 200 538 L 340 538" class="arrow"/>
  <path d="M 480 502 L 480 538 L 340 538" class="arrow"/>
  <path d="M 340 538 L 340 560" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Layer 5: Outputs -->
  <rect x="80" y="564" width="520" height="70" rx="6" class="out-bg"/>
  <text x="340" y="586" text-anchor="middle" class="label">Outputs</text>
  <text x="340" y="606" text-anchor="middle" class="mono">output/&lt;query&gt;.ini · *.command · fix.sh · diagnosis.md</text>
  <text x="340" y="624" text-anchor="middle" class="sub">all four formats consumed downstream — no manual translation step</text>

  <!-- Arrow to NvSDKManager -->
  <path d="M 340 634 L 340 662" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Layer 6: NvSDKManager subprocess -->
  <rect x="160" y="666" width="360" height="56" rx="6" class="layer-bg"/>
  <text x="340" y="688" text-anchor="middle" class="label">NvSDKManager.exe (subprocess target, not competitor)</text>
  <text x="340" y="708" text-anchor="middle" class="mono">--cli --response-file output/&lt;query&gt;.ini</text>

  <!-- Footer note -->
  <text x="340" y="745" text-anchor="middle" class="sub">Production path: replace each MCP tool with internal data sources — see docs/why-this-demo.md → ranked knowledge bases.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
</svg>
