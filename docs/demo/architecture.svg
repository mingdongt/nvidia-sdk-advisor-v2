<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif">
  <!-- NVIDIA SDK Advisor — agent + MCP architecture. Hero banner companion to docs/demo/full-mode.gif.
       Two flows: configure (gray, free-text query) and troubleshoot (teal, log archive). -->
  <style>
    .layer-bg   { fill: #ffffff; stroke: #2d3748; stroke-width: 1.5; }
    .agent-bg   { fill: #fefaf2; stroke: #d97706; stroke-width: 1.8; }
    .mcp-bg     { fill: #f0f7ff; stroke: #2b6cb0; stroke-width: 1.5; }
    .out-bg     { fill: #f0fff4; stroke: #2f855a; stroke-width: 1.5; }
    .ts-bg      { fill: #f0fdfa; stroke: #0d9488; stroke-width: 1.8; }
    .title      { font-size: 16px; font-weight: 700; fill: #1a202c; }
    .label      { font-size: 13px; font-weight: 600; fill: #1a202c; }
    .label-ts   { font-size: 13px; font-weight: 600; fill: #0f766e; }
    .sub        { font-size: 11px; fill: #4a5568; }
    .sub-ts     { font-size: 11px; fill: #0f766e; }
    .mono       { font-family: 'SF Mono', Consolas, Menlo, monospace; font-size: 10.5px; fill: #2d3748; }
    .mono-ts    { font-family: 'SF Mono', Consolas, Menlo, monospace; font-size: 10.5px; fill: #0f766e; font-weight: 600; }
    .arrow      { stroke: #4a5568; stroke-width: 1.5; fill: none; }
    .arrow-ts   { stroke: #0d9488; stroke-width: 1.8; fill: none; stroke-dasharray: 4 3; }
    .dashed     { stroke: #e53e3e; stroke-width: 1.8; stroke-dasharray: 6 5; fill: none; }
    .boundary   { font-size: 11px; font-weight: 700; fill: #c53030; letter-spacing: 0.5px; }
    .external   { font-size: 10.5px; fill: #6b46c1; font-style: italic; }
    .legend     { font-size: 11px; fill: #2d3748; }
  </style>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" class="title">NVIDIA SDK Advisor — agent + MCP architecture</text>
  <text x="360" y="44" text-anchor="middle" class="sub">Two flows on one architecture · dashed red line marks what's replaceable on the inside</text>

  <!-- Legend -->
  <line x1="180" y1="58" x2="220" y2="58" class="arrow"/>
  <text x="226" y="61" class="legend">configure (free-text → .ini / .command)</text>
  <line x1="440" y1="58" x2="480" y2="58" class="arrow-ts"/>
  <text x="486" y="61" class="legend">troubleshoot (log .zip → fix.sh / diagnosis.md)</text>

  <!-- Layer 1: Two input boxes side by side -->
  <rect x="40" y="72" width="320" height="58" rx="6" class="layer-bg"/>
  <text x="200" y="92" text-anchor="middle" class="label">Configure input (free-text)</text>
  <text x="200" y="112" text-anchor="middle" class="mono">"I have an Orin NX 16GB, want edge LLM"</text>

  <rect x="380" y="72" width="320" height="58" rx="6" class="ts-bg"/>
  <text x="540" y="92" text-anchor="middle" class="label-ts">Troubleshoot input (log archive)</text>
  <text x="540" y="112" text-anchor="middle" class="mono-ts">SDKM_logs_JetPack_6.2_..._2025-01-26.zip</text>

  <!-- Arrows 1→2 -->
  <path d="M 200 130 L 200 156" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 540 130 L 540 156" class="arrow-ts" marker-end="url(#arrowhead-ts)"/>

  <!-- Layer 2: Agent (shared) -->
  <rect x="40" y="160" width="660" height="100" rx="6" class="agent-bg"/>
  <text x="370" y="183" text-anchor="middle" class="label">Claude Agent · Haiku 4.5 (swappable via ANTHROPIC_MODEL)</text>
  <text x="370" y="204" text-anchor="middle" class="sub">system prompt: workflow + tool routing · tool loop · output synthesis</text>
  <text x="200" y="226" text-anchor="middle" class="sub">configure: dispatches to MCP tools (deterministic + RAG)</text>
  <text x="540" y="226" text-anchor="middle" class="sub-ts">troubleshoot: reads log tail, then web_search for expert fixes</text>
  <text x="370" y="248" text-anchor="middle" class="external">↗ Anthropic API · server-side web_search tool (forums.developer.nvidia.com, docs, askubuntu, SO)</text>

  <!-- Arrows 2→servers -->
  <path d="M 180 260 L 180 304" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 540 260 L 540 304" class="arrow-ts" marker-end="url(#arrowhead-ts)"/>
  <path d="M 420 260 L 420 304" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="192" y="278" class="mono">stdio</text>
  <text x="432" y="278" class="mono">stdio</text>
  <text x="552" y="278" class="mono-ts">stdio</text>

  <!-- MCP boundary dashed line -->
  <line x1="20" y1="290" x2="700" y2="290" class="dashed"/>
  <text x="360" y="286" text-anchor="middle" class="boundary">— — — MCP boundary: each tool below is independently replaceable — — —</text>

  <!-- Layer 3: MCP servers -->
  <rect x="40" y="308" width="320" height="116" rx="6" class="mcp-bg"/>
  <text x="200" y="330" text-anchor="middle" class="label">nvidia-knowledge</text>
  <text x="200" y="348" text-anchor="middle" class="sub">deterministic · 13 tools</text>
  <text x="200" y="370" text-anchor="middle" class="mono">list_releases · lookup_target_id</text>
  <text x="200" y="386" text-anchor="middle" class="mono">validate_combo · estimate_resources</text>
  <text x="200" y="402" text-anchor="middle" class="mono">generate_response_file ...</text>
  <text x="200" y="418" text-anchor="middle" class="mono-ts">parse_install_log  ← troubleshoot</text>

  <rect x="380" y="308" width="320" height="116" rx="6" class="mcp-bg"/>
  <text x="540" y="330" text-anchor="middle" class="label">nvidia-corpus-rag</text>
  <text x="540" y="348" text-anchor="middle" class="sub">semantic · 2 tools (configure only)</text>
  <text x="540" y="370" text-anchor="middle" class="mono">lookup_container_reqs</text>
  <text x="540" y="386" text-anchor="middle" class="mono">(NGC catalog · 20 entries)</text>
  <text x="540" y="402" text-anchor="middle" class="mono">search_3p_sample_repos (RAG)</text>
  <text x="540" y="418" text-anchor="middle" class="sub-ts">(not in troubleshoot path)</text>

  <!-- Arrows servers→data -->
  <path d="M 200 424 L 200 452" class="arrow" marker-end="url(#arrowhead)"/>
  <path d="M 540 424 L 540 452" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Layer 4: Data sources -->
  <text x="200" y="468" text-anchor="middle" class="label">Data sources (configure)</text>
  <text x="200" y="486" text-anchor="middle" class="sub">CDN manifests (snapshot) · resource model</text>
  <text x="200" y="502" text-anchor="middle" class="sub">response templates (NVIDIA's official .ini)</text>

  <text x="540" y="468" text-anchor="middle" class="label">Data sources (configure)</text>
  <text x="540" y="486" text-anchor="middle" class="sub">NGC catalog (20 containers)</text>
  <text x="540" y="502" text-anchor="middle" class="sub">GitHub READMEs (21, Chroma index)</text>

  <!-- Troubleshoot data note (no static data — web is the source) -->
  <text x="360" y="528" text-anchor="middle" class="sub-ts">troubleshoot grounding: server-side web_search at agent layer ↑ (no static corpus)</text>

  <!-- Convergence arrows back to outputs -->
  <path d="M 200 510 L 200 548 L 200 570" class="arrow"/>
  <path d="M 540 510 L 540 548 L 540 570" class="arrow"/>

  <!-- Layer 5: Outputs — split visually -->
  <rect x="40" y="574" width="320" height="74" rx="6" class="out-bg"/>
  <text x="200" y="596" text-anchor="middle" class="label">Configure outputs</text>
  <text x="200" y="616" text-anchor="middle" class="mono">output/&lt;query&gt;.ini · *.command</text>
  <text x="200" y="634" text-anchor="middle" class="sub">consumed by NvSDKManager below</text>

  <rect x="380" y="574" width="320" height="74" rx="6" class="ts-bg"/>
  <text x="540" y="596" text-anchor="middle" class="label-ts">Troubleshoot outputs</text>
  <text x="540" y="616" text-anchor="middle" class="mono-ts">fix.sh · diagnosis.md</text>
  <text x="540" y="634" text-anchor="middle" class="sub-ts">user reviews + runs (sudo gate)</text>

  <!-- Arrow from configure outputs to NvSDKManager -->
  <path d="M 200 648 L 200 680" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Layer 6: NvSDKManager subprocess (configure path only) -->
  <rect x="40" y="684" width="320" height="58" rx="6" class="layer-bg"/>
  <text x="200" y="706" text-anchor="middle" class="label">NvSDKManager.exe (subprocess target)</text>
  <text x="200" y="726" text-anchor="middle" class="mono">--cli --response-file output/&lt;query&gt;.ini</text>

  <!-- Note for troubleshoot outputs -->
  <text x="540" y="704" text-anchor="middle" class="sub-ts">(troubleshoot outputs do not feed back</text>
  <text x="540" y="722" text-anchor="middle" class="sub-ts">into NvSDKManager — user-mediated)</text>

  <!-- Footer -->
  <text x="360" y="772" text-anchor="middle" class="sub">Production path: replace each MCP tool with internal data sources — see docs/why-this-demo.md → ranked knowledge bases.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrowhead-ts" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
</svg>
